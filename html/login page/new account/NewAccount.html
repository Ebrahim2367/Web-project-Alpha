<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Store Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body align="center">

<h1 style="color: rgb(255, 128, 0);">Create new account</h1>
    <form id="accountForm">
        <p><input type="text" id="username" placeholder="Username" required></p>
        <p><input type="password" id="password" placeholder="Password" required></p>
        <p><button type="submit">Register Account</button></p>
    </form>

    <script src="app.js"></script>
</body>
</html>
